services:
  easyconnect:
    image: hagb/docker-easyconnect:7.6.7
    container_name: easyconnect
    privileged: true
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    environment:
      - PASSWORD=opencode
      - URLWIN=1
      - USE_NOVNC=1
    volumes:
      - ecdata:/root
    ports:
      - "127.0.0.1:5901:5901"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:1080:1080"
      - "127.0.0.1:8888:8888"
    restart: unless-stopped

volumes:
  ecdata:
